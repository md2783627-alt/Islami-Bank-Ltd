<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>কুইজ — Islami Bank LMT</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="bank-logo">
      <img src="logo.png" alt="Islami Bank" style="width:100%;height:100%;object-fit:contain;border-radius:10px;" />
    </div>
    <div class="bank-name">
      <h1>Islami Bank LMT</h1>
      <p>Bangladesh Limited</p>
    </div>
  </header>

  <div class="container" style="padding-top: 24px;">
    <div class="card">

      <!-- Progress -->
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
      </div>
      <div class="progress-text" id="progress-text">প্রশ্ন ১ / ৫</div>

      <!-- Question -->
      <p class="question-text" id="question-text">লোড হচ্ছে...</p>

      <!-- Options -->
      <div class="options-grid" id="options"></div>

      <!-- Next button -->
      <div style="margin-top: 20px;">
        <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;">
          পরের প্রশ্ন →
        </button>
      </div>
    </div>

    <div style="text-align:center; font-size:14px; color:#888; margin-top:4px;">
      🎁 ৫/৫ সঠিক উত্তর = ৳১০,০০০ পুরস্কার
    </div>
  </div>

  <div class="footer">© 2026 Islami Bank Bangladesh Limited</div>

  <script src="quiz.js"></script>
</body>
</html>
